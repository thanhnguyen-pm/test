<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a65ff">
  <title>Spend</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <main class="app" id="app" hidden>
    <section class="summary">
      <div class="label">Today</div>
      <div class="today-total" id="todayTotal">—</div>
      <div class="today-count" id="todayCount">0 entries</div>
    </section>

    <form class="entry" id="entryForm" autocomplete="off" novalidate>
      <label class="amount-wrap">
        <span class="currency-sign" id="currencySign">$</span>
        <input
          id="amountInput"
          class="amount-input"
          type="text"
          inputmode="decimal"
          placeholder="0"
          autocomplete="off"
          enterkeyhint="done"
          aria-label="Amount"
        >
      </label>

      <div class="chips" id="chips" role="group" aria-label="Category">
        <button type="button" class="chip" data-cat="Food">Food</button>
        <button type="button" class="chip" data-cat="Transport">Transport</button>
        <button type="button" class="chip" data-cat="Shopping">Shopping</button>
        <button type="button" class="chip" data-cat="Bills">Bills</button>
        <button type="button" class="chip" data-cat="Fun">Fun</button>
        <button type="button" class="chip" data-cat="Other">Other</button>
      </div>

      <button type="submit" class="primary" id="addBtn" disabled>Add</button>
    </form>

    <section class="recent">
      <div class="recent-header">
        <h2>Recent</h2>
        <span class="muted" id="recentMore"></span>
      </div>
      <ul class="recent-list" id="recentList"></ul>
      <p class="empty" id="recentEmpty" hidden>No entries yet. Type an amount above to get started.</p>
    </section>

    <section class="totals">
      <div class="totals-row">
        <div><span class="muted">This week</span><strong id="weekTotal">—</strong></div>
        <div><span class="muted">This month</span><strong id="monthTotal">—</strong></div>
      </div>
      <div class="actions">
        <button type="button" class="link" id="exportBtn">Export</button>
        <button type="button" class="link" id="importBtn">Import</button>
        <button type="button" class="link" id="changeCurrencyBtn">Change currency</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="currencyModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">Pick your currency</h2>
      <p class="muted" id="modalNote">You can change this later.</p>
      <div class="currency-grid">
        <button type="button" class="currency-btn" data-currency="VND"><span class="sym">₫</span><span>VND</span></button>
        <button type="button" class="currency-btn" data-currency="USD"><span class="sym">$</span><span>USD</span></button>
        <button type="button" class="currency-btn" data-currency="EUR"><span class="sym">€</span><span>EUR</span></button>
        <button type="button" class="currency-btn" data-currency="GBP"><span class="sym">£</span><span>GBP</span></button>
        <button type="button" class="currency-btn" data-currency="JPY"><span class="sym">¥</span><span>JPY</span></button>
      </div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
